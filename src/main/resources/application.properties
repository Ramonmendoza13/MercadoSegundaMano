spring.application.name=Mercado Segunda Mano

spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false

server.port=8080

# Cloudinary
cloudinary.url=${CLOUDINARY_URL}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

app.products.max-images=8

server.tomcat.max-part-count=50
server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB

# SendGrid HTTP API (puerto 443, funciona en Render sin restricciones)
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.mail.from=${MAIL_FROM}

# Stripe
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}
