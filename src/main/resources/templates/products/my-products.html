<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Mis productos | Mercado Segunda Mano</title>
    <th:block th:replace="~{layout/base :: pageHead}"></th:block>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>
<div th:replace="~{layout/base :: flashMessages}"></div>

<main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="section-title mb-0">Mis productos</h1>
        <a th:href="@{/my/products/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-2"></i>Publicar nuevo anuncio
        </a>
    </div>

    <!-- Con productos -->
    <div th:if="${not #lists.isEmpty(products)}">
        <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th style="width:80px;">Imagen</th>
                            <th>Título</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th>Fecha</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <!-- Imagen miniatura -->
                            <td>
                                <img th:if="${not #lists.isEmpty(product.imagePaths)}"
                                     th:src="@{/uploads/{img}(img=${product.imagePaths[0]})}"
                                     th:alt="${product.title}"
                                     class="rounded"
                                     style="width:60px; height:60px; object-fit:cover;">
                                <div th:if="${#lists.isEmpty(product.imagePaths)}"
                                     class="rounded bg-light d-flex align-items-center justify-content-center"
                                     style="width:60px; height:60px;">
                                    <i class="bi bi-image text-muted"></i>
                                </div>
                            </td>
                            <!-- Título -->
                            <td>
                                <a th:href="@{/products/{id}(id=${product.id})}"
                                   class="text-decoration-none fw-semibold text-dark"
                                   th:text="${product.title}">Título</a>
                            </td>
                            <!-- Precio -->
                            <td class="fw-bold"
                                th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')} + ' €'">0,00 €</td>
                            <!-- Estado -->
                            <td>
                                <span class="badge"
                                      th:classappend="${product.status.name() == 'AVAILABLE'} ? ' badge-available' : ' badge-sold'"
                                      th:text="${product.status.displayName}">Estado</span>
                            </td>
                            <!-- Fecha -->
                            <td class="text-muted small"
                                th:text="${#temporals.format(product.createdAt, 'dd/MM/yyyy')}">—</td>
                            <!-- Acciones -->
                            <td class="text-center">
                                <div class="d-flex justify-content-center gap-2">
                                    <a th:href="@{/my/products/{id}/edit(id=${product.id})}"
                                       class="btn btn-sm btn-outline-primary" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form method="POST" th:action="@{/my/products/{id}/delete(id=${product.id})}"
                                          onsubmit="return confirm('¿Seguro que quieres eliminar «' + this.dataset.title + '»?')"
                                          th:data-title="${product.title}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Borrar">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <p class="text-muted small mt-2 text-end"
           th:text="${#lists.size(products)} + ' producto(s) publicado(s)'"></p>
    </div>

    <!-- Sin productos -->
    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
        <i class="bi bi-box-seam display-1 text-muted"></i>
        <h4 class="mt-3 text-muted">Aún no has publicado ningún producto</h4>
        <p class="text-muted">Empieza publicando tu primer anuncio ahora mismo.</p>
        <a th:href="@{/my/products/new}" class="btn btn-primary mt-2">
            <i class="bi bi-plus-circle me-1"></i>Publicar anuncio
        </a>
    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
