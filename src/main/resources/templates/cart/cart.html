<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Mi carrito | Mercado Segunda Mano</title>
    <th:block th:replace="~{layout/base :: pageHead}"></th:block>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>
<div th:replace="~{layout/base :: flashMessages}"></div>

<main class="container my-5" style="max-width: 900px;">
    <h1 class="section-title mb-4" style="font-size: 2.2rem; border:none; padding:0; letter-spacing: -1px;">Colección actual</h1>

    <!-- Carrito con items -->
    <div th:if="${cart != null and not #lists.isEmpty(cart.items)}">
        <div class="row g-5">
            <!-- Lista de items -->
            <div class="col-lg-8">
                <div class="card border-0 rounded-3 overflow-hidden" style="border: 1px solid var(--border-color) !important;">
                    <div th:each="item : ${cart.items}" class="p-4 border-bottom d-flex align-items-center gap-4" style="border-color: var(--border-color) !important;">
                        <!-- Imagen -->
                        <div style="flex-shrink:0;">
                            <img th:if="${not #lists.isEmpty(item.product.imagePaths)}"
                                 th:src="${item.product.imagePaths[0]}"
                                 class="rounded-3"
                                 style="width:90px; height:90px; object-fit:cover; border: 1px solid var(--border-color);"
                                 th:alt="${item.product.title}">
                            <div th:if="${#lists.isEmpty(item.product.imagePaths)}"
                                 class="rounded-3 d-flex align-items-center justify-content-center"
                                 style="width:90px; height:90px; background-color: var(--brand-light);">
                                <i class="bi bi-camera text-muted" style="opacity: 0.5;"></i>
                            </div>
                        </div>
                        <!-- Info producto -->
                        <div class="flex-grow-1">
                            <a th:href="@{/products/{id}(id=${item.product.id})}"
                               class="text-decoration-none text-dark fw-bold mb-1 d-block"
                               style="font-family: 'Outfit'; font-size: 1.15rem;"
                               th:text="${item.product.title}">Producto</a>
                            <div class="text-muted small mb-2" style="font-weight: 500;"><i class="bi bi-person me-1"></i><span th:text="${item.product.seller?.username}">Vendedor</span></div>
                            <div class="price fs-5" style="color: var(--brand-dark);"
                                 th:text="${#numbers.formatDecimal(item.product.price, 1, 'COMMA', 2, 'POINT')} + ' €'">0,00 €</div>
                        </div>
                        <!-- Botón eliminar -->
                        <form method="POST" th:action="@{/cart/remove/{itemId}(itemId=${item.id})}">
                            <button type="submit" class="btn btn-outline-dark px-3 py-2" title="Quitar de la colección" style="border-radius: 8px;">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </form>
                    </div>
                </div>
                <!-- Seguir comprando -->
                <a th:href="@{/products}" class="btn btn-outline-primary mt-4 py-2 px-4 shadow-none">
                    <i class="bi bi-arrow-left me-2"></i>Seguir explorando
                </a>
            </div>

            <!-- Resumen -->
            <div class="col-lg-4">
                <div class="card p-4 rounded-4" style="background-color: var(--brand-light); border: none;">
                    <h5 class="fw-bold mb-4" style="font-family: 'Outfit'; color: var(--brand-dark);">Resumen</h5>
                    <div class="d-flex justify-content-between mb-3 text-muted" style="font-weight: 500;">
                        <span>Piezas seleccionadas</span>
                        <span th:text="${#lists.size(cart.items)}">0</span>
                    </div>
                    <hr style="border-color: rgba(0,0,0,0.1); margin: 1.5rem 0;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <strong class="fs-5" style="color: var(--brand-dark);">Total a pagar</strong>
                        <strong class="fs-3" style="font-family: 'Outfit'; font-weight: 800; color: var(--brand-main); letter-spacing: -1px;"
                                th:text="${#numbers.formatDecimal(cart.total, 1, 'COMMA', 2, 'POINT')} + ' €'">0,00 €</strong>
                    </div>
                    <a th:href="@{/checkout}" class="btn btn-primary w-100 btn-lg shadow-none">
                        Tramitar pedido
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Carrito vacío -->
    <div th:if="${cart == null or #lists.isEmpty(cart.items)}" class="text-center py-5 my-4" style="border: 1px dashed var(--border-color); border-radius: 12px; background-color: #fff;">
        <i class="bi bi-bag display-1 text-muted" style="opacity: 0.2;"></i>
        <h4 class="mt-4" style="font-family:'Outfit'; color: var(--brand-dark);">Aún no has seleccionado nada</h4>
        <p class="text-muted mb-4">Descubre piezas únicas en nuestro catálogo.</p>
        <a th:href="@{/products}" class="btn btn-primary px-4 py-2">
            Iniciar la búsqueda
        </a>
    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
