<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Tramitar pedido | Mercado Segunda Mano</title>
    <th:block th:replace="~{layout/base :: pageHead}"></th:block>

    <!-- Stripe -->
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>
<div th:replace="~{layout/base :: flashMessages}"></div>

<main class="container my-4" style="max-width: 800px;">
    <h1 class="section-title">Tramitar pedido</h1>

    <div class="alert alert-info border-0 shadow-sm mb-4">
        <i class="bi bi-info-circle-fill me-2"></i>
        <strong>Modo prueba:</strong> Usa la tarjeta <code>4242 4242 4242 4242</code>
    </div>

    <div class="row g-4">

        <!-- FORMULARIO -->
        <div class="col-md-7">
            <div class="card border-0 shadow-sm rounded-3 p-4">

                <h5 class="fw-bold mb-3">
                    <i class="bi bi-geo-alt me-2 text-primary"></i>Dirección de envío
                </h5>

                <!-- DIRECCIÓN -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Dirección</label>
                    <input type="text" id="street" class="form-control" required>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Código Postal</label>
                        <input type="text" id="postalCode" class="form-control" required>
                    </div>

                    <div class="col-md-8 mb-3">
                        <label class="form-label fw-semibold">Ciudad</label>
                        <input type="text" id="city" class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Provincia</label>
                    <input type="text" id="province" class="form-control" required>
                </div>

                <!-- PAGO STRIPE -->
                <hr>
                <h6 class="fw-bold mt-3">Pago</h6>

                <div id="payment-element" class="mb-3"></div>

                <div id="payment-errors" class="alert alert-danger d-none"></div>

                <button id="submit-btn" class="btn btn-primary w-100 btn-lg">
                    <span id="btn-text">Confirmar compra</span>
                    <span id="btn-spinner" class="d-none">
                        <span class="spinner-border spinner-border-sm me-2"></span>Procesando...
                    </span>
                </button>

                <a th:href="@{/cart}" class="btn btn-outline-secondary w-100 mt-2">
                    Volver al carrito
                </a>

            </div>
        </div>

        <!-- RESUMEN -->
        <div class="col-md-5">
            <div class="card border-0 shadow-sm rounded-3 p-4">
                <h5 class="fw-bold mb-3">
                    <i class="bi bi-receipt me-2 text-primary"></i>Resumen
                </h5>

                <div th:each="item : ${cart.items}" class="d-flex align-items-center gap-2 mb-2 pb-2 border-bottom">
                    <div class="flex-grow-1 min-width-0">
                        <div class="small fw-semibold text-truncate"
                             th:text="${item.product.title}">Producto</div>
                    </div>
                    <div class="small fw-bold text-nowrap"
                         th:text="${#numbers.formatDecimal(item.product.price, 1, 'COMMA', 2, 'POINT')} + ' €'"></div>
                </div>

                <div class="d-flex justify-content-between mt-2">
                    <strong class="fs-5">Total</strong>
                    <strong class="fs-5 text-primary"
                            th:text="${#numbers.formatDecimal(cart.total, 1, 'COMMA', 2, 'POINT')} + ' €'"></strong>
                </div>
            </div>
        </div>

    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>

<script th:inline="javascript">
    const publishableKey = /*[[${stripePublishableKey}]]*/ '';
    const clientSecret = /*[[${clientSecret}]]*/ '';

    const stripe = Stripe(publishableKey);
    const elements = stripe.elements({ clientSecret });

    const paymentElement = elements.create('payment');
    paymentElement.mount('#payment-element');

    document.getElementById('submit-btn').addEventListener('click', async () => {

        const street = document.getElementById('street').value;
        const postalCode = document.getElementById('postalCode').value;
        const city = document.getElementById('city').value;
        const province = document.getElementById('province').value;

        if (!street || !postalCode || !city || !province) {
            showError('Completa todos los campos de envío');
            return;
        }

        const address = `${street}, ${postalCode}, ${city}, ${province}`;

        toggleLoading(true);

        const { error } = await stripe.confirmPayment({
            elements,
            confirmParams: {
                return_url: window.location.origin +
                    '/cart/checkout/success?address=' + encodeURIComponent(address)
            }
        });

        if (error) {
            showError(error.message);
            toggleLoading(false);
        }
    });

    function showError(message) {
        const el = document.getElementById('payment-errors');
        el.textContent = message;
        el.classList.remove('d-none');
    }

    function toggleLoading(isLoading) {
        document.getElementById('btn-text').classList.toggle('d-none', isLoading);
        document.getElementById('btn-spinner').classList.toggle('d-none', !isLoading);
        document.getElementById('submit-btn').disabled = isLoading;
    }
</script>

</body>
</html>
