<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Crear cuenta | Mercado Segunda Mano</title>
    <th:block th:replace="~{layout/base :: pageHead}"></th:block>
    <style>
        .auth-wrapper {
            min-height: calc(100vh - 64px);
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            display: flex;
            align-items: center;
        }
        .auth-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>

<div class="auth-wrapper py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-9 col-md-8 col-lg-6">
                <div class="card auth-card">
                    <div class="card-body p-5">
                        <!-- Logo / Título -->
                        <div class="text-center mb-4">
                            <div class="display-5 text-primary mb-2"><i class="bi bi-person-plus"></i></div>
                            <h2 class="fw-bold" style="color: #2c3e50;">Crear cuenta</h2>
                            <p class="text-muted small">Únete gratis al marketplace</p>
                        </div>

                        <!-- Error global (ej: username o email ya en uso) -->
                        <div th:if="${error}" class="alert alert-danger border-0 py-2" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <span th:text="${error}">Error en el registro.</span>
                        </div>

                        <!-- Formulario registro -->
                        <form method="POST" th:action="@{/register}" th:object="${registerDto}"
                              class="needs-validation" novalidate>

                            <!-- Username -->
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Nombre de usuario</label>
                                <div class="input-group"
                                     th:classappend="${#fields.hasErrors('username')} ? 'has-validation' : ''">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-person text-muted"></i>
                                    </span>
                                    <input type="text" id="username"
                                           th:field="*{username}"
                                           class="form-control border-start-0"
                                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                                           placeholder="Tu nombre de usuario"
                                           autocomplete="username"
                                           required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                                         th:errors="*{username}">Error</div>
                                    <div class="invalid-feedback" th:unless="${#fields.hasErrors('username')}">
                                        El nombre de usuario es obligatorio.
                                    </div>
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Correo electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-envelope text-muted"></i>
                                    </span>
                                    <input type="email" id="email"
                                           th:field="*{email}"
                                           class="form-control border-start-0"
                                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                           placeholder="tu@email.com"
                                           autocomplete="email"
                                           required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                                         th:errors="*{email}">Error</div>
                                    <div class="invalid-feedback" th:unless="${#fields.hasErrors('email')}">
                                        Introduce un email válido.
                                    </div>
                                </div>
                            </div>

                            <!-- Password -->
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-lock text-muted"></i>
                                    </span>
                                    <input type="password" id="password"
                                           th:field="*{password}"
                                           class="form-control border-start-0"
                                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                                           placeholder="Mínimo 8 caracteres"
                                           autocomplete="new-password"
                                           required minlength="8">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                                         th:errors="*{password}">Error</div>
                                    <div class="invalid-feedback" th:unless="${#fields.hasErrors('password')}">
                                        La contraseña debe tener al menos 8 caracteres.
                                    </div>
                                </div>
                            </div>

                            <!-- Confirmar Password -->
                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label fw-semibold">Confirmar contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-lock-fill text-muted"></i>
                                    </span>
                                    <input type="password" id="confirmPassword"
                                           th:field="*{confirmPassword}"
                                           class="form-control border-start-0"
                                           th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                                           placeholder="Repite tu contraseña"
                                           autocomplete="new-password"
                                           required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}"
                                         th:errors="*{confirmPassword}">Error</div>
                                    <div class="invalid-feedback" th:unless="${#fields.hasErrors('confirmPassword')}">
                                        Por favor confirma tu contraseña.
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg fw-semibold mb-3">
                                <i class="bi bi-person-check me-2"></i>Crear cuenta gratis
                            </button>
                        </form>

                        <p class="text-center text-muted mb-0 small">
                            ¿Ya tienes cuenta?
                            <a th:href="@{/login}" class="fw-semibold text-decoration-none">Inicia sesión</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
<script>
    (function() {
        'use strict';
        document.querySelectorAll('.needs-validation').forEach(function(form) {
            form.addEventListener('submit', function(e) {
                if (!form.checkValidity()) { e.preventDefault(); e.stopPropagation(); }
                form.classList.add('was-validated');
            });
        });
    })();
</script>
</body>
</html>
