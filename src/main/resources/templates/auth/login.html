<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Iniciar sesión | Mercado Segunda Mano</title>
    <th:block th:replace="~{layout/base :: pageHead}"></th:block>
    <style>
        .auth-wrapper {
            min-height: calc(100vh - 64px);
            background-color: var(--brand-light);
            display: flex;
            align-items: center;
        }
        .auth-card {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: #fff;
        }
    </style>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>

<div class="auth-wrapper py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-9 col-md-7 col-lg-5">
                <div class="card auth-card shadow-sm">
                    <div class="card-body p-5">
                        <!-- Logo / Título -->
                        <div class="text-center mb-5">
                            <div class="display-5 mb-3" style="color: var(--brand-dark);"><i class="bi bi-door-open"></i></div>
                            <h2 class="fw-bold" style="font-family: 'Outfit'; color: var(--brand-dark); letter-spacing: -1px;">Acceso al mercado</h2>
                            <p class="text-muted small">Introduce tus credenciales</p>
                        </div>

                        <!-- Error de credenciales -->
                        <div th:if="${param.error}" class="alert border-0 py-3 d-flex align-items-center" style="background-color: #fdeaea; color: #e74c3c; border-radius: 8px;" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-3 fs-5"></i>
                            <div>Credenciales no reconocidas. Inténtalo de nuevo.</div>
                        </div>

                        <!-- Mensaje tras cerrar sesión -->
                        <div th:if="${param.logout}" class="alert border-0 py-3 d-flex align-items-center" style="background-color: #eafaf1; color: #27ae60; border-radius: 8px;" role="alert">
                            <i class="bi bi-check-circle-fill me-3 fs-5"></i>
                            <div>Sesión finalizada con éxito.</div>
                        </div>

                        <!-- Mensaje flash de éxito (ej: tras registro) -->
                        <div th:if="${successMessage}" class="alert border-0 py-3 d-flex align-items-center" style="background-color: #eafaf1; color: #27ae60; border-radius: 8px;" role="alert">
                            <i class="bi bi-check-circle-fill me-3 fs-5"></i>
                            <div th:text="${successMessage}"></div>
                        </div>

                        <!-- Formulario login -->
                        <form method="POST" th:action="@{/login}" class="needs-validation" novalidate>
                            <div class="mb-4">
                                <label for="username" class="form-label" style="font-weight: 600; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase;">Nombre de usuario</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0" style="border-radius: 8px 0 0 8px;">
                                        <i class="bi bi-person text-muted"></i>
                                    </span>
                                    <input type="text" id="username" name="username"
                                           class="form-control border-start-0 py-2"
                                           style="border-radius: 0 8px 8px 0; background-color: #fcfcfc;"
                                           placeholder="Tu identificador"
                                           autocomplete="username"
                                           required>
                                </div>
                                <div class="invalid-feedback">Introduce el Nombre de usuario.</div>
                            </div>

                            <div class="mb-5">
                                <label for="password" class="form-label" style="font-weight: 600; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase;">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0" style="border-radius: 8px 0 0 8px;">
                                        <i class="bi bi-key text-muted"></i>
                                    </span>
                                    <input type="password" id="password" name="password"
                                           class="form-control border-start-0 py-2"
                                           style="border-radius: 0 8px 8px 0; background-color: #fcfcfc;"
                                           placeholder="Tu contraseña"
                                           autocomplete="current-password"
                                           required>
                                </div>
                                <div class="invalid-feedback">Falta la Contraseña.</div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg shadow-none py-3 mb-4 rounded-3" style="font-family: 'Inter';">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                            </button>
                        </form>

                        <p class="text-center text-muted mb-0" style="font-size: 0.95rem;">
                            ¿Aún en modo explorador?
                            <a th:href="@{/register}" class="fw-bold ms-1" style="color: var(--brand-dark); text-decoration: underline;">Registrarse gratis</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
<script>
    (function() {
        'use strict';
        document.querySelectorAll('.needs-validation').forEach(function(form) {
            form.addEventListener('submit', function(e) {
                if (!form.checkValidity()) { e.preventDefault(); e.stopPropagation(); }
                form.classList.add('was-validated');
            });
        });
    })();
</script>
</body>
</html>
