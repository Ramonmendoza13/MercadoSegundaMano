<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Iniciar sesión | Mercado Segunda Mano</title>
    <th:block th:replace="~{layout/base :: pageHead}"></th:block>
    <style>
        .auth-wrapper {
            min-height: calc(100vh - 64px);
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            display: flex;
            align-items: center;
        }
        .auth-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>

<div class="auth-wrapper py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-9 col-md-7 col-lg-5">
                <div class="card auth-card">
                    <div class="card-body p-5">
                        <!-- Logo / Título -->
                        <div class="text-center mb-4">
                            <div class="display-5 text-primary mb-2"><i class="bi bi-shop"></i></div>
                            <h2 class="fw-bold" style="color: #2c3e50;">Bienvenido de vuelta</h2>
                            <p class="text-muted small">Inicia sesión en tu cuenta</p>
                        </div>

                        <!-- Error de credenciales -->
                        <div th:if="${param.error}" class="alert alert-danger border-0 py-2" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            Usuario o contraseña incorrectos. Inténtalo de nuevo.
                        </div>

                        <!-- Mensaje tras cerrar sesión -->
                        <div th:if="${param.logout}" class="alert alert-success border-0 py-2" role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            Has cerrado sesión correctamente.
                        </div>

                        <!-- Mensaje flash de éxito (ej: tras registro) -->
                        <div th:if="${successMessage}" class="alert alert-success border-0 py-2" role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            <span th:text="${successMessage}"></span>
                        </div>

                        <!-- Formulario login -->
                        <form method="POST" th:action="@{/login}" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Usuario</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-person text-muted"></i>
                                    </span>
                                    <input type="text" id="username" name="username"
                                           class="form-control border-start-0"
                                           placeholder="Tu nombre de usuario"
                                           autocomplete="username"
                                           required>
                                </div>
                                <div class="invalid-feedback">Introduce tu nombre de usuario.</div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-lock text-muted"></i>
                                    </span>
                                    <input type="password" id="password" name="password"
                                           class="form-control border-start-0"
                                           placeholder="Tu contraseña"
                                           autocomplete="current-password"
                                           required>
                                </div>
                                <div class="invalid-feedback">Introduce tu contraseña.</div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg fw-semibold mb-3">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
                            </button>
                        </form>

                        <p class="text-center text-muted mb-0 small">
                            ¿No tienes cuenta?
                            <a th:href="@{/register}" class="fw-semibold text-decoration-none">Regístrate gratis</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
<script>
    (function() {
        'use strict';
        document.querySelectorAll('.needs-validation').forEach(function(form) {
            form.addEventListener('submit', function(e) {
                if (!form.checkValidity()) { e.preventDefault(); e.stopPropagation(); }
                form.classList.add('was-validated');
            });
        });
    })();
</script>
</body>
</html>
