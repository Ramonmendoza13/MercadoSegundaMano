<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Mi perfil | Mercado Segunda Mano</title>
    <th:block th:replace="~{layout/base :: pageHead}"></th:block>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>
<div th:replace="~{layout/base :: flashMessages}"></div>

<main class="container my-4">
    <h1 class="section-title">Mi perfil</h1>

    <div class="row g-4">
        <!-- Columna izquierda: Avatar y formularios -->
        <div class="col-lg-4">

            <!-- Avatar -->
            <div class="card border-0 shadow-sm rounded-3 p-4 text-center mb-4">
                <div class="mb-3">
                    <img th:if="${user.avatarPath != null and !#strings.isEmpty(user.avatarPath)}"
                         th:src="@{/uploads/{img}(img=${user.avatarPath})}"
                         class="rounded-circle shadow border border-3 border-white"
                         style="width:120px; height:120px; object-fit:cover;"
                         alt="Avatar">
                    <div th:if="${user.avatarPath == null or #strings.isEmpty(user.avatarPath)}"
                         class="rounded-circle bg-primary d-inline-flex align-items-center justify-content-center shadow"
                         style="width:120px; height:120px;">
                        <i class="bi bi-person-fill text-white" style="font-size: 3.5rem;"></i>
                    </div>
                </div>
                <h5 class="fw-bold mb-0" th:text="${user.username}">Usuario</h5>
                <p class="text-muted small mb-3" th:text="${user.email}">email@ejemplo.com</p>
                <!-- Formulario subir avatar -->
                <form method="POST" th:action="@{/profile/avatar}" enctype="multipart/form-data">
                    <div class="mb-2">
                        <input type="file" name="avatar" class="form-control form-control-sm" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-outline-primary btn-sm w-100">
                        <i class="bi bi-camera me-1"></i>Cambiar foto
                    </button>
                </form>
            </div>

            <!-- Formulario editar datos -->
            <div class="card border-0 shadow-sm rounded-3 p-4">
                <h6 class="fw-bold mb-3"><i class="bi bi-pencil-square me-2 text-primary"></i>Editar datos</h6>
                <form method="POST" th:action="@{/profile/edit}" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Nombre de usuario</label>
                        <input type="text" id="username" name="username" class="form-control"
                               th:value="${user.username}" required>
                        <div class="invalid-feedback">El nombre de usuario es obligatorio.</div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">Correo electrónico</label>
                        <input type="email" id="email" name="email" class="form-control"
                               th:value="${user.email}" required>
                        <div class="invalid-feedback">Introduce un email válido.</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-lg me-1"></i>Guardar cambios
                    </button>
                </form>
            </div>
        </div>

        <!-- Columna derecha: Mis productos -->
        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="fw-bold mb-0">
                    <i class="bi bi-box-seam me-2 text-primary"></i>Mis anuncios
                </h4>
                <a th:href="@{/my/products/new}" class="btn btn-sm btn-primary">
                    <i class="bi bi-plus-circle me-1"></i>Nuevo anuncio
                </a>
            </div>

            <div class="row g-3" th:if="${not #lists.isEmpty(products)}">
                <div class="col-sm-6" th:each="product : ${products}">
                    <div class="card product-card h-100">
                        <div style="position:relative; height:160px; background:#f0f0f0;">
                            <img th:if="${not #lists.isEmpty(product.imagePaths)}"
                                 th:src="@{/uploads/{img}(img=${product.imagePaths[0]})}"
                                 th:alt="${product.title}"
                                 style="width:100%; height:160px; object-fit:cover;">
                            <div th:if="${#lists.isEmpty(product.imagePaths)}"
                                 class="d-flex align-items-center justify-content-center w-100 h-100">
                                <i class="bi bi-image text-muted" style="font-size:2rem;"></i>
                            </div>
                            <span class="badge position-absolute top-0 end-0 m-2"
                                  th:classappend="${product.status.name() == 'AVAILABLE'} ? ' badge-available' : ' badge-sold'"
                                  th:text="${product.status.displayName}">Estado</span>
                        </div>
                        <div class="card-body p-3">
                            <h6 class="card-title text-truncate mb-1" th:text="${product.title}">Título</h6>
                            <div class="price mb-2"
                                 th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')} + ' €'">0,00 €</div>
                            <div class="d-flex gap-2">
                                <a th:href="@{/products/{id}(id=${product.id})}"
                                   class="btn btn-sm btn-outline-primary flex-fill">Ver</a>
                                <a th:href="@{/my/products/{id}/edit(id=${product.id})}"
                                   class="btn btn-sm btn-outline-secondary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
                <i class="bi bi-box-seam display-3 text-muted"></i>
                <p class="text-muted mt-2">Aún no has publicado ningún producto.</p>
                <a th:href="@{/my/products/new}" class="btn btn-primary btn-sm mt-1">
                    <i class="bi bi-plus-circle me-1"></i>Publicar ahora
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
<script>
    (function() {
        'use strict';
        document.querySelectorAll('.needs-validation').forEach(function(form) {
            form.addEventListener('submit', function(e) {
                if (!form.checkValidity()) { e.preventDefault(); e.stopPropagation(); }
                form.classList.add('was-validated');
            });
        });
    })();
</script>
</body>
</html>
