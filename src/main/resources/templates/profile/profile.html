<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Mi perfil | Mercado Segunda Mano</title>
    <th:block th:replace="~{layout/base :: pageHead}"></th:block>
</head>

<body>

    <div th:replace="~{layout/base :: navbar}"></div>
    <div th:replace="~{layout/base :: flashMessages}"></div>

    <main class="container my-5" style="max-width: 1000px;">
        <h1 class="section-title mb-5" style="font-size: 2.2rem; border:none; padding:0; letter-spacing: -1px;">Área
            personal</h1>

        <div class="row g-5">
            <!-- Columna izquierda: Avatar y formularios -->
            <div class="col-lg-4">

                <!-- Avatar -->
                <div class="card p-4 text-center mb-4 rounded-4"
                    style="border: 1px solid var(--border-color); background-color: #fff;">
                    <div class="mb-4">
                        <img th:if="${user.avatarPath != null and !#strings.isEmpty(user.avatarPath)}"
                            th:src="${user.avatarPath}" class="rounded-circle"
                            style="width:130px; height:130px; object-fit:cover; border: 2px solid var(--border-color); padding: 4px;"
                            alt="Avatar">
                        <div th:if="${user.avatarPath == null or #strings.isEmpty(user.avatarPath)}"
                            class="rounded-circle d-inline-flex align-items-center justify-content-center"
                            style="width:130px; height:130px; background-color: var(--brand-light); border: 2px solid var(--border-color);">
                            <i class="bi bi-person text-muted" style="font-size: 3.5rem; opacity: 0.5;"></i>
                        </div>
                    </div>
                    <h5 class="fw-bold mb-1"
                        style="font-family: 'Outfit'; color: var(--brand-dark); font-size: 1.25rem;"
                        th:text="${user.username}">Usuario</h5>
                    <p class="text-muted small mb-4" th:text="${user.email}">email@ejemplo.com</p>
                    <!-- Formulario subir avatar -->
                    <form method="POST" th:action="@{/profile/avatar}" enctype="multipart/form-data">
                        <div class="mb-3">
                            <input type="file" name="avatar" class="form-control form-control-sm"
                                style="border-radius: 6px; border-color: var(--border-color);" accept="image/*"
                                required>
                        </div>
                        <button type="submit" class="btn btn-outline-dark btn-sm w-100 py-2 shadow-none"
                            style="border-radius: 8px;">
                            Actualizar avatar
                        </button>
                    </form>
                </div>

                <!-- Formulario editar datos -->
                <div class="card p-4 rounded-4" style="background-color: var(--brand-light); border: none;">
                    <h6 class="fw-bold mb-4 pb-2 border-bottom"
                        style="font-family: 'Outfit'; color: var(--brand-dark); border-color: rgba(0,0,0,0.1) !important;">
                        Ajustes de contacto</h6>
                    <form method="POST" th:action="@{/profile/edit}" class="needs-validation" novalidate>
                        <div class="mb-4">
                            <label for="username" class="form-label"
                                style="font-weight: 600; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Alias</label>
                            <input type="text" id="username" name="username" class="form-control"
                                style="border-radius: 8px; border-color: transparent;" th:value="${user.username}"
                                required>
                            <div class="invalid-feedback">El nombre de usuario es obligatorio.</div>
                        </div>
                        <div class="mb-4">
                            <label for="email" class="form-label"
                                style="font-weight: 600; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Correo</label>
                            <input type="email" id="email" name="email" class="form-control"
                                style="border-radius: 8px; border-color: transparent;" th:value="${user.email}"
                                required>
                            <div class="invalid-feedback">Introduce un email válido.</div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 shadow-none py-2"
                            style="border-radius: 8px;">
                            Guardar cambios
                        </button>
                    </form>
                </div>
            </div>

            <!-- Columna derecha: Mis productos -->
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0" style="font-family: 'Outfit'; color: var(--brand-dark);">
                        Tu escaparate
                    </h4>
                    <a th:href="@{/my/products/new}" class="btn btn-outline-dark btn-sm px-3 shadow-none rounded-3">
                        <i class="bi bi-plus me-1"></i>Añadir producto
                    </a>
                </div>

                <div class="row g-4" th:if="${not #lists.isEmpty(products)}">
                    <div class="col-md-6" th:each="product : ${products}">
                        <div class="card h-100 rounded-4 overflow-hidden border-0"
                            style="background-color: transparent;">
                            <a th:href="@{/products/{id}(id=${product.id})}" class="d-block"
                                style="position:relative; aspect-ratio: 4/3; overflow: hidden; border-radius: 12px; border: 1px solid var(--border-color);">
                                <img th:if="${not #lists.isEmpty(product.imagePaths)}" th:src="${product.imagePaths[0]}"
                                    th:alt="${product.title}" class="w-100 h-100 object-fit-cover"
                                    style="transition: transform 0.3s ease;">
                                <div th:if="${#lists.isEmpty(product.imagePaths)}"
                                    class="d-flex align-items-center justify-content-center w-100 h-100"
                                    style="background-color: var(--brand-light);">
                                    <i class="bi bi-camera text-muted" style="font-size:2rem; opacity: 0.5;"></i>
                                </div>
                                <span class="badge position-absolute top-0 end-0 m-3 px-3 py-2 rounded-pill"
                                    style="font-family: 'Outfit'; font-weight: 600; letter-spacing: 0.5px;"
                                    th:classappend="${product.status.name() == 'AVAILABLE'} ? ' bg-dark text-white' : ' bg-secondary text-white'"
                                    th:text="${product.status.displayName}">Estado</span>
                            </a>
                            <div class="card-body px-1 py-3 d-flex flex-column">
                                <h6 class="card-title text-truncate mb-1"
                                    style="font-family: 'Outfit'; font-size: 1.15rem; font-weight: 600; color: var(--brand-dark);"
                                    th:text="${product.title}">Título</h6>
                                <div class="price mb-3 fs-5" style="color: var(--brand-dark);"
                                    th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')} + ' €'">
                                    0,00 €</div>
                                <div class="mt-auto d-flex gap-2">
                                    <a th:href="@{/my/products/{id}/edit(id=${product.id})}"
                                        class="btn btn-outline-dark w-100 py-2 shadow-none" style="border-radius: 8px;">
                                        Editar detalles
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(products)}" class="text-center py-5 my-4"
                    style="border: 1px dashed var(--border-color); border-radius: 12px; background-color: #fff;">
                    <i class="bi bi-shop display-1 text-muted" style="opacity: 0.2;"></i>
                    <h4 class="mt-4" style="font-family: 'Outfit'; color: var(--brand-dark);">Tu escaparate está vacío
                    </h4>
                    <p class="text-muted mb-4">Abre tu caja y comparte tus objetos de valor.</p>
                    <a th:href="@{/my/products/new}" class="btn btn-primary px-4 py-2 shadow-none">
                        Exponer mi primera pieza
                    </a>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/base :: footer}"></div>
    <div th:replace="~{layout/base :: scripts}"></div>
    <script>
        (function () {
            'use strict';
            document.querySelectorAll('.needs-validation').forEach(function (form) {
                form.addEventListener('submit', function (e) {
                    if (!form.checkValidity()) { e.preventDefault(); e.stopPropagation(); }
                    form.classList.add('was-validated');
                });
            });
        })();
    </script>
</body>

</html>
